apis:
  - aid: character-ai:character-ai-web-app
    name: Character.AI Web Application
    tags:
      - Web
      - Consumer
      - Chat
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://character.ai/
    baseURL: https://character.ai/
    properties:
      - url: https://character.ai/
        type: Website
      - url: https://book.character.ai/
        type: Documentation
    description: >-
      Web client for chatting with Characters, creating new Characters, and managing rooms, voices, scenes, and personas. Internal endpoints are private and not part of a public developer surface.
  - aid: character-ai:character-ai-mobile-app
    name: Character.AI Mobile Apps
    tags:
      - Mobile
      - iOS
      - Android
      - Consumer
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
