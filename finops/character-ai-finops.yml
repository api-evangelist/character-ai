description: >-
  FinOps view of Character.AI spend. Character.AI is a consumer subscription
  product - the only chargeable surface is the c.ai+ monthly subscription
  per user. There is no public developer API and no token / call metering.
  In a corporate FinOps view, c.ai+ should be treated as an end-user SaaS
  subscription tracked in the SaaS-management category.
notes: >-
  No public developer API; charges appear as recurring per-seat consumer
  subscription line items charged to the user's payment method (or app
  store).
